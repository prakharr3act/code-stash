<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Orbitron:wght@400..900&display=swap" rel="stylesheet">
  <title>Gift Card</title>
</head>
<body>

  <div class="header">

    <h1>Today is Meow's birthday! 🎉</h1>
    <img src="./images/cat.avif" alt="Meow" class="birthday-person-image">
    <h2 id="bday-age">2 years old</h2>
    <h4 id="bday-date">14.12.2025</h4>
    
  </div>

  <div class="gift-section">

    <h2 class="gift-title"> Here's how i'm happy for your birthday today 🥳 </h2>
    <h3 class="gift-hint">(Hover over the Gift)</h3>
    <div class="gift-img" id="gift-img-happy"> </div>

  </div>

    <div class="gift-section-2">

    <h2 class="gift-title"> How people react when you enter the room 😍 </h2>
    <div class="gift-img" id="gift-img-hot"> </div>

  </div>


   <div class="gift-section-3">

    <h2 class="gift-title"> How others feel after meeting you😎 </h2>
    <div class="gift-img-3" id="gift-img-genius"> </div>

  </div>

   <div class="gift-section-4">

    <h2 class="gift-title"> How Cops react after pulling you over 🤠 </h2>
    <div class="gift-img-4" id="gift-img-badass"> </div>

  </div>

  <div class="gift-section-5">

    <h2 class="gift-title"> Last one  is a Suprise for you 😻 </h2>
    <div class="gift-img-5" id="gift-img-suprise"> </div>

  </div>

</body>
</html>
