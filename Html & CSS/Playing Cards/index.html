<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Cards</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>The Dealer's Hand</h1>
<div class="container">

<div class="card">
  <div class="corner top">
    <span>A</span>
    <span>&spades;</span>
  </div>
  <div class="middle">&spades;</div>
  <div class="corner bottom">
    <span>&spades;</span> 
    <span>A</span>
  </div>
</div>

<div class="card">
  <div class="corner top">
    <span>K</span>
    <span>&hearts;</span>
  </div>
  <div class="middle">&hearts;</div>
  <div class="corner bottom">
    <span>&hearts;</span> 
    <span>K</span>
  </div>
</div>

<div class="card">
  <div class="corner top">
    <span>Q</span>
    <span>&diams;</span>
  </div>
  <div class="middle">&diams;</div>
  <div class="corner bottom">
    <span>&diams;</span> 
    <span>Q</span>
  </div>
</div>

</div>
</body>
</html>
