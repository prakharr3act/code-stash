<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metric-imperial-converter</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Happy+Monkey&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  
<div class="container">

  <div class="input-div">
<h1>Metric/Imperial Unit Conversion</h1>
  <input type="text" >
  <button>Convert</button>
  </div>

  <div class="result-div">

  <div class="result-1">
    <h4>Length (Meter/Feet)</h4>
   <p id="result-1-p">1 meter = 3.281 feet | 1 foot = 0.3048 meters</p>
  </div>

  <div class="result-2">
    <h4>Volume (Liters/Gallons)</h4>
<p id="result-2-p">1 liter = 0.264 gallons | 1 gallon = 3.785 liters</p>
  </div>
  <div class="result-3">
  <h4>Mass (Kilograms/Pounds)</h4>
  <p id="result-3-p">1 kilogram (kilo) =  2.205 pounds | 1 pound = 0.454 kilograms (kilo) </p>
  </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
