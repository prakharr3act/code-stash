<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>transitoryCalc</title>
  <link rel="stylesheet" href="calc.css">
</head>
<body>
    
  <div class="container">
    <div class="inputDiv">
      <input type="text" readonly>
    </div>
    <div class="btnContainer">
      <button onclick="
       currentDisplay = ''
    document.querySelector('input').value = currentDisplay;">C</button>
      <button onclick="
       currentDisplay = currentDisplay + 1
    document.querySelector('input').value = currentDisplay;"
    >1</button>
      <button onclick="
       currentDisplay = currentDisplay + 2
    document.querySelector('input').value = currentDisplay;"
    >2</button>
      <button onclick="
       currentDisplay = currentDisplay + '+'
    document.querySelector('input').value = currentDisplay;">+</button>
      <button onclick="
       currentDisplay = currentDisplay + 3
    document.querySelector('input').value = currentDisplay;"
    >3</button>
      <button onclick="
       currentDisplay = currentDisplay + 4
    document.querySelector('input').value = currentDisplay;"
    >4</button>
      <button onclick="
       currentDisplay = currentDisplay + '-'
    document.querySelector('input').value = currentDisplay;">-</button>
      <button onclick="
       currentDisplay = currentDisplay + 5
    document.querySelector('input').value = currentDisplay;"
    >5</button>
      <button onclick="
       currentDisplay = currentDisplay + 6
    document.querySelector('input').value = currentDisplay;"
    >6</button>
      <button onclick="
       currentDisplay = currentDisplay + '*'
    document.querySelector('input').value = currentDisplay;">x</button>
      <button onclick="
       currentDisplay = currentDisplay + 7
    document.querySelector('input').value = currentDisplay;"
    >7</button>
      <button onclick="
       currentDisplay = currentDisplay + 8
    document.querySelector('input').value = currentDisplay;"
    >8</button>
      <button onclick="
       currentDisplay = currentDisplay + '/'
    document.querySelector('input').value = currentDisplay;">/</button>
      <button
      onclick="
      let result = eval(currentDisplay)
       currentDisplay = result
    document.querySelector('input').value = currentDisplay;"
      >=</button>
      <button onclick="
       currentDisplay = currentDisplay + 9
    document.querySelector('input').value = currentDisplay;"
    >9</button>
      <button onclick="
       currentDisplay = currentDisplay + 0
    document.querySelector('input').value = currentDisplay;"
    >0</button>
      <button onclick="
       currentDisplay = currentDisplay + '.'
    document.querySelector('input').value = currentDisplay;">.</button>
    </div>
  </div>
    <script>
    let currentDisplay = '';
    document.querySelector('input').value = currentDisplay;
      </script>
</body>
</html>
